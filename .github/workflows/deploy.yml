name: Deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # Setup Python para tests
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Instalar dependencias
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest

    # Ejecutar tests (no falla si no hay tests)
    - name: Run tests
      run: |
        pytest || true

    # Login a Azure Container Registry
    - name: Login ACR
      uses: azure/docker-login@v2
      with:
        login-server: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    # Build imagen Docker (SIN CACHE)
    - name: Build image
      run: |
        docker build --no-cache -t ${{ secrets.ACR_LOGIN_SERVER }}/hands-app:${{ github.sha }} .

    # Push a ACR
    - name: Push image
      run: |
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/hands-app:${{ github.sha }}

    # Deploy a Azure Web App
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: pycaret-insurance
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        images: ${{ secrets.ACR_LOGIN_SERVER }}/hands-app:${{ github.sha }}
